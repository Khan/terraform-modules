version: 2
updates:
  # Terraform provider updates
  - package-ecosystem: "terraform"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
      timezone: "America/New_York"
    reviewers:
      - "infrastructure-team"
    assignees:
      - "infrastructure-team"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"

  # Terraform module updates (for any nested modules)
  - package-ecosystem: "terraform"
    directory: "/terraform/modules/scheduled-function"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
      timezone: "America/New_York"
    reviewers:
      - "infrastructure-team"
    assignees:
      - "infrastructure-team"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"

  # GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "friday"
      time: "09:00"
      timezone: "America/New_York"
    reviewers:
      - "infrastructure-team"
    assignees:
      - "infrastructure-team"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope" 