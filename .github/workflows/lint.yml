name: Terraform and Markdown Lint
env:
  TERRAFORM_VERSION: 1.8.0 # edit
  TFLINT_VERSION: 0.51.1 # edit
  # example projects/123456789/locations/global/workloadIdentityPools/github-actions/providers/github-actions
  # WORKLOAD_IDENTITY_PROVIDER: "" # TODO: Edit here
  # SERVICE_ACCOUNT_EMAIL: "" # TODO: Edit here
on:
  pull_request:
    branches:
    - main
    - master
  push:
    branches:
    - main
    - master
  workflow_dispatch:
# When a new revision is pushed to a PR, cancel all in-progress CI runs for that
# PR. See https://docs.github.com/en/actions/using-jobs/using-concurrency
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  pr-test:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
    - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v1
      with:
        terraform_version: ${{ env.TERRAFORM_VERSION }}
    - name: Initialize Terraform
      run: terraform init
    - name: Check Terraform format
      run: terraform fmt -check -recursive
      working-directory: terraform
      continue-on-error: true
    - uses: terraform-linters/setup-tflint@acd1575d3c037258ce5b2dd01379dc49ce24c6b7 # v5
      name: Setup TFLint
      with:
        tflint_version: 'v${{ env.TFLINT_VERSION }}'
    - name: Show version
      run: tflint --version
    - name: Init TFLint
      run: tflint --init
      # TODO: edit here when in private repositories
      #      env:
      #        # https://github.com/terraform-linters/tflint/blob/master/docs/user-guide/plugins.md#avoiding-rate-limiting
      #        GITHUB_TOKEN: ${{ github.token }}
    - name: Run TFLint
      run: tflint -f compact
    - name: yaml-lint
      uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c # v3
      with:
        config_file: .yamllint.yaml
        format: github
