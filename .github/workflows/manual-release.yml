name: Manual Release
on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Module name to release (e.g., scheduled-function)'
        required: true
        type: string
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string
      release_notes:
        description: 'Release notes (optional)'
        required: false
        type: string
permissions:
  contents: write
jobs:
  validate-input:
    name: Validate Input
    runs-on: ubuntu-latest
    outputs:
      module-exists: ${{ steps.check-module.outputs.exists }}
      version-valid: ${{ steps.check-version.outputs.valid }}
    steps:
    - name: Checkout
      uses: actions/checkout@v5
    - name: Check if module exists
      id: check-module
      run: |
        if [ -d "terraform/modules/${{ github.event.inputs.module }}" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "Module ${{ github.event.inputs.module }} exists"
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "ERROR: Module ${{ github.event.inputs.module }} does not exist"
          exit 1
        fi
    - name: Validate version format
      id: check-version
      run: |
        version="${{ github.event.inputs.version }}"
        if [[ $version =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "valid=true" >> $GITHUB_OUTPUT
          echo "Version format is valid: $version"
        else
          echo "valid=false" >> $GITHUB_OUTPUT
          echo "ERROR: Version format is invalid: $version (expected format: x.y.z)"
          exit 1
        fi
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: validate-input
    if: needs.validate-input.outputs.module-exists == 'true' && needs.validate-input.outputs.version-valid == 'true'
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Check version constraints
      run: "module=\"${{ github.event.inputs.module }}\"\nnew_version=\"${{ github.event.inputs.version }}\"\ntag_name=\"$module-v$new_version\"\n\n# Check if exact tag already exists\nif git tag -l | grep -q \"^$tag_name$\"; then\n  echo \"ERROR: Tag $tag_name already exists\"\n  exit 1\nfi\n\n# Get latest version for this module\nlatest_tag=$(git tag -l \"${module}-v*\" | sort -V | tail -n1)\n\nif [ -n \"$latest_tag\" ]; then\n  latest_version=${latest_tag#${module}-v}\n  echo \"Latest existing version: $latest_version\"\n  echo \"New version: $new_version\"\n  \n  # Compare versions using sort -V (version sort)\n  higher_version=$(echo -e \"$latest_version\\n$new_version\" | sort -V | tail -n1)\n  \n  if [ \"$higher_version\" = \"$latest_version\" ] && [ \"$new_version\" != \"$latest_version\" ]; then\n    echo \"ERROR: New version $new_version is not greater than latest version $latest_version\"\n    echo \"Next valid versions would be:\"\n    \n    # Suggest next versions\n    IFS='.' read -r major minor patch <<< \"$latest_version\"\n    echo \"   - Patch: $major.$minor.$((patch + 1))\"\n    echo \"   - Minor: $major.$((minor + 1)).0\"  \n    echo \"   - Major: $((major + 1)).0.0\"\n    exit 1\n  fi\nelse\n  echo \"No existing versions found for module $module\"\nfi\n\necho \"Version $new_version is valid and available\"\n"
    - name: Generate release notes
      id: generate-notes
      run: |
        module="${{ github.event.inputs.module }}"
        version="${{ github.event.inputs.version }}"
        user_notes="${{ github.event.inputs.release_notes }}"

        # Create release notes
        {
          echo "# $module v$version"
          echo ""
          if [ -n "$user_notes" ]; then
            echo "$user_notes"
            echo ""
          fi
          echo "## Usage"
          echo ""
          echo '```hcl'
          echo "module \"$module\" {"
          echo "  source = \"git::https://github.com/${{ github.repository }}.git//terraform/modules/$module?ref=$module-v$version\""
          echo "  "
          echo "  # Module configuration"
          echo "}"
          echo '```'
        } > release_notes.md
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.module }}-v${{ github.event.inputs.version }}
        name: "${{ github.event.inputs.module }} v${{ github.event.inputs.version }}"
        body_path: release_notes.md
        draft: false
        prerelease: false
