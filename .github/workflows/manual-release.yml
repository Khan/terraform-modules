name: Manual Release
on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Module name to release (e.g., scheduled-function)'
        required: true
        type: string
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string
      release_notes:
        description: 'Release notes (optional)'
        required: false
        type: string
permissions:
  contents: write
jobs:
  validate-input:
    name: Validate Input
    runs-on: ubuntu-latest
    outputs:
      module-exists: ${{ steps.check-module.outputs.exists }}
      version-valid: ${{ steps.check-version.outputs.valid }}
    steps:
    - name: Checkout
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
    - name: Check if module exists
      id: check-module
      env:
        TERRAFORM_MODULE: "${{ github.event.inputs.module }}"
      run: |
        if [ -d "terraform/modules/${TERRAFORM_MODULE}" ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
          echo "Module ${TERRAFORM_MODULE} exists"
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "ERROR: Module ${TERRAFORM_MODULE} does not exist"
          exit 1
        fi
    - name: Validate version format
      id: check-version
      env:
        VERSION: "${{ github.event.inputs.version }}"
      run: |
        version="$VERSION"
        if [[ $version =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "valid=true" >> $GITHUB_OUTPUT
          echo "Version format is valid: $version"
        else
          echo "valid=false" >> $GITHUB_OUTPUT
          echo "ERROR: Version format is invalid: $version (expected format: x.y.z)"
          exit 1
        fi
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: validate-input
    if: needs.validate-input.outputs.module-exists == 'true' && needs.validate-input.outputs.version-valid == 'true'
    steps:
    - name: Checkout
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5
      with:
        fetch-depth: 0
    - name: Check version constraints
      env:
        TERRAFORM_MODULE: "${{ github.event.inputs.module }}"
        VERSION: "${{ github.event.inputs.version }}"
      run: ./.github/workflows/check_version_constraints.sh
    - name: Generate release notes
      id: generate-notes
      env:
        TERRAFORM_MODULE: "${{ github.event.inputs.module }}"
        VERSION: "${{ github.event.inputs.version }}"
        RELEASE_NOTES: "${{ github.event.inputs.release_notes }}"
        GITHUB_REPOSITORY: "${{ github.repository }}"
      run: |
        module="${TERRAFORM_MODULE}"
        version="${VERSION}"
        user_notes="${RELEASE_NOTES}"

        # Create release notes
        {
          echo "# $module v$version"
          echo ""
          if [ -n "$user_notes" ]; then
            echo "$user_notes"
            echo ""
          fi
          echo "## Usage"
          echo ""
          echo '```hcl'
          echo "module \"$module\" {"
          echo "  source = \"git::https://github.com/${GITHUB_REPOSITORY}.git//terraform/modules/$module?ref=$module-v$version\""
          echo "  "
          echo "  # Module configuration"
          echo "}"
          echo '```'
        } > release_notes.md
    - name: Create Release
      uses: softprops/action-gh-release@6cbd405e2c4e67a21c47fa9e383d020e4e28b836 # v2
      with:
        tag_name: ${{ github.event.inputs.module }}-v${{ github.event.inputs.version }}
        name: "${{ github.event.inputs.module }} v${{ github.event.inputs.version }}"
        body_path: release_notes.md
        draft: false
        prerelease: false
